<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 微信卡片强制配置 -->
    <title>我想对你说的话</title>
    <meta name="description" content="点开有惊喜">
    <meta property="og:title" content="我想对你说的话">
    <meta property="og:description" content="点开有惊喜">
    <meta property="og:image" content="https://picsum.photos/seed/msg/300/200">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {margin:0;padding:0;box-sizing:border-box;}
        body {background:#fff;height:100vh;overflow:hidden;}
        .modal {position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
        .modal-box {width:80%;max-width:300px;background:#fff;border-radius:12px;overflow:hidden;}
        .modal-title {padding:20px 15px 10px;text-align:center;font-size:17px;font-weight:600;}
        .modal-text {padding:0 15px 20px;text-align:center;font-size:15px;color:#666;}
        .modal-btn {width:100%;padding:14px;border:none;background:#fff;color:#07c160;font-size:16px;font-weight:600;border-top:1px solid #eee;}
    </style>
</head>
<body>
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-title">提示</div>
            <div class="modal-text">请更新到微信最新版本查看此内容</div>
            <button class="modal-btn" onclick="reopen()">确定</button>
        </div>
    </div>
    <script>
        function reopen(){
            document.getElementById("modal").remove();
            let m=document.createElement("div");
            m.className="modal";
            m.id="modal";
            m.innerHTML=`<div class="modal-box"><div class="modal-title">提示</div><div class="modal-text">请更新到微信最新版本查看此内容</div><button class="modal-btn" onclick="reopen()">确定</button></div>`;
            document.body.appendChild(m);
        }
        document.addEventListener("keydown",e=>e.key==="Escape"&&e.preventDefault());
    </script>
</body>
</html>
