<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我想对你说的话</title>

    <!-- === 卡片显示设置 === -->
    <!-- 这里的标题就是卡片上显示的大字 -->
    <meta property="og:title" content="我想对你说的话">
    <!-- 这里的描述是卡片上的小字 -->
    <meta property="og:description" content="点开这个链接，是我藏在心里很久的一句话...">
    <!-- 这里的图片可以留空，或者放一张简单的纯色图，如果不填可能会显示默认链接图标 -->
    <meta property="og:image" content=""> 
    <meta property="og:type" content="website">

    <style>
        /* 页面样式：让文字居中显示，看起来舒服一点 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .content {
            font-size: 24px;
            color: #333;
            line-height: 1.6;
            max-width: 80%;
        }
        /* 手机端字体稍微小一点 */
        @media (max-width: 600px) {
            .content {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- === 这里修改你想显示的具体内容 === -->
    <div class="content">
        <p>这里写你想说的话，</p>
        <p>比如：其实我喜欢你很久了。</p>
    </div>

    <script>
        // === 弹窗逻辑 ===
        // 页面加载完成后执行
        window.onload = function() {
            // 这里修改弹窗里的文字
            alert("这里写你想说的话，比如：其实我喜欢你很久了。");
        };
    </script>

</body>
</html>
